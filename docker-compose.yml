services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oblimap
      POSTGRES_USER: oblimap
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Expose on LAN so you can run migrations from your PC / pgAdmin.
    # Remove this if you don't need external access.
    #ports:
    #  - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oblimap"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  server:
    image: meejay/oblimap-server:${OBLIMAP_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgres://oblimap:${DB_PASSWORD:-changeme}@postgres:5432/oblimap
      SESSION_SECRET: ${SESSION_SECRET:-change-this-in-production}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
    volumes:
      - ${CUSTOM_DIR:-./custom}:/custom

  client:
    image: meejay/oblimap-client:${OBLIMAP_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${LISTEN_PORT:-3000}:80"

  # ─── Watchtower (optional) ────────────────────────────────────────────────
  # Automatically pulls & restarts containers when a new image is pushed.
  # Works per image tag: set OBLIMAP_VERSION=latest/dev/stable etc.
  # Enable: docker compose --profile watchtower up -d
  # Or add COMPOSE_PROFILES=watchtower to your .env
  watchtower:
    image: containrrr/watchtower
    profiles: ["watchtower"]
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_INTERVAL:-3600}

volumes:
  postgres_data:
